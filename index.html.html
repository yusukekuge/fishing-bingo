<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ザ・海上釣堀 BINGO</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --sky: #00aeef;
    --sky-dark: #0090cc;
    --madai: #e8384f;
    --trout: #2ecc71;
    --kurosoi: #34495e;
    --ginzake: #7f8c8d;
    --hirame: #c68e17;
    --white: #ffffff;
    --cell-radius: 8px;
  }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: linear-gradient(180deg, var(--sky) 0%, var(--sky-dark) 100%);
    min-height: 100dvh;
    color: #fff;
    overflow-x: hidden;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; flex-direction: column; align-items: center; min-height: 100dvh; padding: 16px; }
  .screen.active { display: flex; }

  /* ===== SETUP SCREEN ===== */
  #setup { justify-content: center; gap: 24px; text-align: center; }

  .logo-area { position: relative; }
  .logo-area h1 {
    font-size: 2.2rem; font-weight: 900;
    text-shadow: 3px 3px 0 rgba(0,0,0,.25);
    line-height: 1.2;
  }
  .logo-area .bingo-text {
    font-size: 3.5rem; font-weight: 900;
    color: #FFD700;
    text-shadow: 3px 3px 0 #c4900a, 0 0 20px rgba(255,215,0,.4);
    letter-spacing: 0.15em;
  }
  .subtitle { font-size: 1rem; opacity: .85; margin-top: 4px; }

  .player-setup {
    background: rgba(255,255,255,.15);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 360px;
  }
  .player-setup label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 1.1rem; }
  .player-count-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
  .player-count-row button {
    width: 48px; height: 48px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,.5);
    background: rgba(255,255,255,.1);
    color: #fff; font-size: 1.3rem; font-weight: 700;
    cursor: pointer; transition: all .2s;
    font-family: inherit;
  }
  .player-count-row button.selected {
    background: #FFD700; color: #333; border-color: #FFD700;
    transform: scale(1.1);
    box-shadow: 0 4px 15px rgba(255,215,0,.4);
  }

  .name-inputs { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .name-inputs input {
    padding: 10px 14px;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,.3);
    background: rgba(255,255,255,.15);
    color: #fff;
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    transition: border-color .2s;
  }
  .name-inputs input::placeholder { color: rgba(255,255,255,.5); }
  .name-inputs input:focus { border-color: #FFD700; }

  .start-btn {
    width: 100%; padding: 14px;
    border-radius: 14px; border: none;
    background: linear-gradient(135deg, #e8384f, #ff6b6b);
    color: #fff; font-size: 1.3rem; font-weight: 900;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 6px 20px rgba(232,56,79,.4);
    transition: transform .15s, box-shadow .15s;
    letter-spacing: .05em;
  }
  .start-btn:active { transform: scale(.97); box-shadow: 0 3px 10px rgba(232,56,79,.3); }

  /* ===== GAME SCREEN ===== */
  #game { padding: 8px; gap: 6px; }

  .game-header {
    width: 100%; max-width: 400px;
    text-align: center;
    padding: 6px 0;
  }
  .game-header h2 {
    font-size: 1.1rem; font-weight: 900;
    text-shadow: 2px 2px 0 rgba(0,0,0,.2);
  }
  .game-header .bingo-small {
    font-size: 1.8rem; font-weight: 900;
    color: #FFD700;
    text-shadow: 2px 2px 0 #c4900a;
    letter-spacing: .1em;
  }

  /* Player tabs */
  .player-tabs {
    display: flex; gap: 4px;
    width: 100%; max-width: 400px;
    overflow-x: auto;
    padding: 4px 0;
    scrollbar-width: none;
  }
  .player-tabs::-webkit-scrollbar { display: none; }
  .player-tab {
    flex: 1; min-width: 60px;
    padding: 8px 6px;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,.3);
    background: rgba(255,255,255,.1);
    color: #fff; font-size: .8rem; font-weight: 700;
    cursor: pointer; font-family: inherit;
    text-align: center;
    transition: all .2s;
    white-space: nowrap;
  }
  .player-tab.active {
    background: #FFD700; color: #333; border-color: #FFD700;
    box-shadow: 0 3px 10px rgba(255,215,0,.3);
  }
  .player-tab.bingo-achieved {
    animation: tabGlow 1s ease-in-out infinite alternate;
  }
  @keyframes tabGlow {
    from { box-shadow: 0 0 5px rgba(255,215,0,.5); }
    to { box-shadow: 0 0 20px rgba(255,215,0,1), 0 0 40px rgba(255,215,0,.5); }
  }

  /* Bingo grid */
  .bingo-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
    width: 100%;
    max-width: 400px;
    aspect-ratio: 1 / 1;
  }

  .bingo-cell {
    position: relative;
    background: var(--white);
    border-radius: var(--cell-radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform .15s;
    overflow: hidden;
    border: 2px solid rgba(0,0,0,.08);
    padding: 4px;
    -webkit-user-select: none;
    user-select: none;
  }
  .bingo-cell:active { transform: scale(.93); }

  .bingo-cell .fish-emoji { font-size: 1.8rem; line-height: 1; }
  .bingo-cell .fish-name {
    font-size: .65rem; font-weight: 900;
    color: #333; margin-top: 2px;
    text-align: center; line-height: 1.1;
  }
  .bingo-cell .fish-name-sub {
    font-size: .55rem; font-weight: 700;
    color: #999;
  }

  /* Stamped state */
  .bingo-cell.stamped {
    background: rgba(255,215,0,.15);
    border-color: #FFD700;
  }
  .bingo-cell.stamped::after {
    content: '✓';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2.8rem;
    color: rgba(232,56,79,.7);
    font-weight: 900;
    pointer-events: none;
    text-shadow: 1px 1px 0 rgba(0,0,0,.1);
  }

  /* Bingo line highlight */
  .bingo-cell.bingo-line {
    background: rgba(255,215,0,.35);
    border-color: #FFD700;
    animation: cellPulse .6s ease-in-out infinite alternate;
  }
  @keyframes cellPulse {
    from { box-shadow: inset 0 0 8px rgba(255,215,0,.3); }
    to { box-shadow: inset 0 0 15px rgba(255,215,0,.7); }
  }

  /* ===== BINGO OVERLAY ===== */
  .bingo-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .bingo-overlay.show { display: flex; }
  .bingo-overlay-content {
    text-align: center;
    animation: popIn .4s cubic-bezier(.17,.67,.35,1.5);
  }
  @keyframes popIn {
    from { transform: scale(.3); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .bingo-overlay-content .big-text {
    font-size: 4rem; font-weight: 900;
    color: #FFD700;
    text-shadow: 4px 4px 0 #c4900a, 0 0 40px rgba(255,215,0,.6);
    letter-spacing: .1em;
  }
  .bingo-overlay-content .winner-name {
    font-size: 1.5rem; font-weight: 700;
    margin-top: 8px;
    text-shadow: 2px 2px 0 rgba(0,0,0,.3);
  }
  .bingo-overlay-content .confetti-text {
    font-size: 2rem;
    margin-top: 12px;
  }
  .bingo-overlay-content .dismiss-btn {
    margin-top: 20px;
    padding: 12px 32px;
    border-radius: 12px; border: none;
    background: #FFD700; color: #333;
    font-size: 1.1rem; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }

  /* ===== FOOTER BUTTONS ===== */
  .game-footer {
    display: flex; gap: 8px;
    width: 100%; max-width: 400px;
    margin-top: 4px;
  }
  .game-footer button {
    flex: 1; padding: 10px;
    border-radius: 10px; border: 2px solid rgba(255,255,255,.3);
    background: rgba(255,255,255,.12);
    color: #fff; font-size: .85rem; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: all .2s;
  }
  .game-footer button:active { background: rgba(255,255,255,.25); }

  /* ===== RESPONSIVE ===== */
  @media (min-width: 500px) {
    .bingo-cell .fish-emoji { font-size: 2.2rem; }
    .bingo-cell .fish-name { font-size: .8rem; }
    .bingo-cell .fish-name-sub { font-size: .65rem; }
  }
</style>
</head>
<body>

<!-- ===== SETUP SCREEN ===== -->
<div id="setup" class="screen active">
  <div class="logo-area">
    <h1>ザ・海上釣堀</h1>
    <div class="bingo-text">BINGO</div>
    <div class="subtitle">ビンゴを目指して魚を釣ろう！</div>
  </div>

  <div class="player-setup">
    <label>何人で遊ぶ？</label>
    <div class="player-count-row" id="countRow"></div>
    <div class="name-inputs" id="nameInputs"></div>
    <button class="start-btn" onclick="startGame()">🎣 ゲームスタート！</button>
  </div>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="game" class="screen">
  <div class="game-header">
    <h2>ザ・海上釣堀</h2>
    <div class="bingo-small">BINGO</div>
  </div>
  <div class="player-tabs" id="playerTabs"></div>
  <div class="bingo-grid" id="bingoGrid"></div>
  <div class="game-footer">
    <button onclick="resetCurrentCard()">🔄 カードリセット</button>
    <button onclick="backToSetup()">🏠 最初に戻る</button>
  </div>
</div>

<!-- ===== BINGO OVERLAY ===== -->
<div class="bingo-overlay" id="bingoOverlay">
  <div class="bingo-overlay-content">
    <div class="confetti-text">🎉🐟🎊</div>
    <div class="big-text">BINGO!</div>
    <div class="winner-name" id="winnerName"></div>
    <div class="confetti-text">🎣🏆🎣</div>
    <button class="dismiss-btn" onclick="dismissBingo()">OK！</button>
  </div>
</div>

<script>
// ===== FISH DATA =====
const FISH = [
  { id: 'madai',   name: 'マダイ',     sub: '真鯛',   emoji: '🐟', weight: 8 },
  { id: 'trout',   name: 'トラウト',    sub: 'サーモン', emoji: '🐠', weight: 3 },
  { id: 'kurosoi', name: 'クロソイ',    sub: '黒曹以',  emoji: '🐡', weight: 2 },
  { id: 'ginzake', name: 'ギンザケ',    sub: '銀鮭',   emoji: '🍣', weight: 2 },
  { id: 'hirame',  name: 'ヒラメ',     sub: '鮃',     emoji: '🐟', weight: 2 },
];

// Weighted random pick
function pickFish() {
  const totalWeight = FISH.reduce((s, f) => s + f.weight, 0);
  let r = Math.random() * totalWeight;
  for (const f of FISH) {
    r -= f.weight;
    if (r <= 0) return { ...f };
  }
  return { ...FISH[0] };
}

// Generate a 4x4 card with reasonably varied fish
function generateCard() {
  const cells = [];
  // Ensure at least one of each fish type
  const guaranteed = FISH.map(f => ({ ...f }));
  // shuffle
  for (let i = guaranteed.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [guaranteed[i], guaranteed[j]] = [guaranteed[j], guaranteed[i]];
  }
  // Place guaranteed fish in first 5 slots
  for (let i = 0; i < 5; i++) {
    cells.push({ ...guaranteed[i], stamped: false });
  }
  // Fill remaining 11 slots with weighted random
  for (let i = 5; i < 16; i++) {
    cells.push({ ...pickFish(), stamped: false });
  }
  // Shuffle all cells
  for (let i = cells.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cells[i], cells[j]] = [cells[j], cells[i]];
  }
  return cells;
}

// ===== GAME STATE =====
let playerCount = 5;
let players = [];
let currentPlayer = 0;
let bingoShownFor = new Set();

// ===== SETUP =====
function initSetup() {
  const row = document.getElementById('countRow');
  row.innerHTML = '';
  for (let i = 2; i <= 10; i++) {
    const btn = document.createElement('button');
    btn.textContent = i;
    btn.onclick = () => selectCount(i);
    if (i === playerCount) btn.classList.add('selected');
    row.appendChild(btn);
  }
  updateNameInputs();
}

function selectCount(n) {
  playerCount = n;
  document.querySelectorAll('.player-count-row button').forEach((btn, idx) => {
    btn.classList.toggle('selected', idx + 2 === n);
  });
  updateNameInputs();
}

function updateNameInputs() {
  const container = document.getElementById('nameInputs');
  const existing = container.querySelectorAll('input');
  const existingValues = Array.from(existing).map(el => el.value);
  container.innerHTML = '';
  for (let i = 0; i < playerCount; i++) {
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = `プレイヤー ${i + 1} の名前`;
    input.value = existingValues[i] || '';
    input.maxLength = 10;
    container.appendChild(input);
  }
}

// ===== START GAME =====
function startGame() {
  const inputs = document.querySelectorAll('.name-inputs input');
  players = [];
  inputs.forEach((inp, i) => {
    const name = inp.value.trim() || `P${i + 1}`;
    players.push({
      name,
      card: generateCard(),
    });
  });
  currentPlayer = 0;
  bingoShownFor = new Set();

  document.getElementById('setup').classList.remove('active');
  document.getElementById('game').classList.add('active');
  renderTabs();
  renderGrid();
}

// ===== RENDER =====
function renderTabs() {
  const container = document.getElementById('playerTabs');
  container.innerHTML = '';
  players.forEach((p, i) => {
    const tab = document.createElement('button');
    tab.className = 'player-tab' + (i === currentPlayer ? ' active' : '');
    tab.textContent = p.name;
    if (checkBingo(p.card).length > 0) tab.classList.add('bingo-achieved');
    tab.onclick = () => { currentPlayer = i; renderTabs(); renderGrid(); };
    container.appendChild(tab);
  });
}

function renderGrid() {
  const grid = document.getElementById('bingoGrid');
  grid.innerHTML = '';
  const card = players[currentPlayer].card;
  const bingoLines = checkBingo(card);
  const bingoCells = new Set();
  bingoLines.forEach(line => line.forEach(idx => bingoCells.add(idx)));

  card.forEach((cell, i) => {
    const div = document.createElement('div');
    div.className = 'bingo-cell';
    if (cell.stamped) div.classList.add('stamped');
    if (bingoCells.has(i)) div.classList.add('bingo-line');

    // Fish-specific color accent
    const colorMap = {
      madai: 'var(--madai)', trout: 'var(--trout)',
      kurosoi: 'var(--kurosoi)', ginzake: 'var(--ginzake)', hirame: 'var(--hirame)'
    };
    div.style.borderBottomColor = colorMap[cell.id] || '#ddd';
    div.style.borderBottomWidth = '3px';

    div.innerHTML = `
      <div class="fish-emoji">${cell.emoji}</div>
      <div class="fish-name" style="color: ${colorMap[cell.id] || '#333'}">${cell.name}</div>
      <div class="fish-name-sub">${cell.sub}</div>
    `;

    div.onclick = () => toggleCell(i);
    grid.appendChild(div);
  });
}

function toggleCell(index) {
  const card = players[currentPlayer].card;
  card[index].stamped = !card[index].stamped;
  renderGrid();
  renderTabs();

  // Check for new bingo
  if (card[index].stamped) {
    const lines = checkBingo(card);
    if (lines.length > 0 && !bingoShownFor.has(currentPlayer)) {
      bingoShownFor.add(currentPlayer);
      setTimeout(() => showBingo(players[currentPlayer].name), 300);
    }
  }
}

// ===== BINGO CHECK =====
function checkBingo(card) {
  const lines = [];
  // Rows
  for (let r = 0; r < 4; r++) {
    const row = [r*4, r*4+1, r*4+2, r*4+3];
    if (row.every(i => card[i].stamped)) lines.push(row);
  }
  // Cols
  for (let c = 0; c < 4; c++) {
    const col = [c, c+4, c+8, c+12];
    if (col.every(i => card[i].stamped)) lines.push(col);
  }
  // Diag
  const d1 = [0,5,10,15], d2 = [3,6,9,12];
  if (d1.every(i => card[i].stamped)) lines.push(d1);
  if (d2.every(i => card[i].stamped)) lines.push(d2);
  return lines;
}

// ===== BINGO OVERLAY =====
function showBingo(name) {
  document.getElementById('winnerName').textContent = `${name} さん おめでとう！🎉`;
  document.getElementById('bingoOverlay').classList.add('show');
  // Vibrate if available
  if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
}

function dismissBingo() {
  document.getElementById('bingoOverlay').classList.remove('show');
}

// ===== ACTIONS =====
function resetCurrentCard() {
  if (confirm(`${players[currentPlayer].name} のカードをリセットしますか？`)) {
    players[currentPlayer].card = generateCard();
    bingoShownFor.delete(currentPlayer);
    renderGrid();
    renderTabs();
  }
}

function backToSetup() {
  if (confirm('最初の画面に戻りますか？\n（ゲームデータは消えます）')) {
    document.getElementById('game').classList.remove('active');
    document.getElementById('setup').classList.add('active');
  }
}

// ===== INIT =====
initSetup();
</script>
</body>
</html>
