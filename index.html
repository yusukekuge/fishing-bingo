<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ザ・海上釣堀 BINGO</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --sky: #00aeef;
    --sky-dark: #0090cc;
    --madai: #e8384f;
    --trout: #2ecc71;
    --kurosoi: #34495e;
    --ginzake: #7f8c8d;
    --hirame: #c68e17;
    --white: #ffffff;
    --cell-radius: 8px;
  }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: linear-gradient(180deg, var(--sky) 0%, var(--sky-dark) 100%);
    min-height: 100dvh;
    color: #fff;
    overflow-x: hidden;
  }

  .screen { display: none; flex-direction: column; align-items: center; min-height: 100dvh; padding: 16px; }
  .screen.active { display: flex; }

  /* ===== SETUP ===== */
  #setup { justify-content: center; gap: 24px; text-align: center; }

  .logo-area h1 {
    font-size: 2.2rem; font-weight: 900;
    text-shadow: 3px 3px 0 rgba(0,0,0,.25);
    line-height: 1.2;
  }
  .logo-area .bingo-text {
    font-size: 3.5rem; font-weight: 900;
    color: #FFD700;
    text-shadow: 3px 3px 0 #c4900a, 0 0 20px rgba(255,215,0,.4);
    letter-spacing: 0.15em;
  }
  .subtitle { font-size: 1rem; opacity: .85; margin-top: 4px; }

  .player-setup {
    background: rgba(255,255,255,.15);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 360px;
  }
  .player-setup label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 1.1rem; }

  .name-input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,.3);
    background: rgba(255,255,255,.15);
    color: #fff;
    font-size: 1.1rem;
    font-family: inherit;
    outline: none;
    margin-bottom: 16px;
    transition: border-color .2s;
  }
  .name-input::placeholder { color: rgba(255,255,255,.5); }
  .name-input:focus { border-color: #FFD700; }

  .card-count-label { margin-top: 4px; }
  .card-count-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; }
  .card-name-inputs { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .card-name-inputs input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,.3);
    background: rgba(255,255,255,.15);
    color: #fff;
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    transition: border-color .2s;
  }
  .card-name-inputs input::placeholder { color: rgba(255,255,255,.5); }
  .card-name-inputs input:focus { border-color: #FFD700; }
  .card-count-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
  .card-count-row button {
    width: 56px; height: 56px;
    border-radius: 14px;
    border: 2px solid rgba(255,255,255,.5);
    background: rgba(255,255,255,.1);
    color: #fff; font-size: 1.5rem; font-weight: 900;
    cursor: pointer; transition: all .2s;
    font-family: inherit;
  }
  .card-count-row button.selected {
    background: #FFD700; color: #333; border-color: #FFD700;
    transform: scale(1.1);
    box-shadow: 0 4px 15px rgba(255,215,0,.4);
  }

  .start-btn {
    width: 100%; padding: 14px;
    border-radius: 14px; border: none;
    background: linear-gradient(135deg, #e8384f, #ff6b6b);
    color: #fff; font-size: 1.3rem; font-weight: 900;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 6px 20px rgba(232,56,79,.4);
    transition: transform .15s, box-shadow .15s;
    letter-spacing: .05em;
  }
  .start-btn:active { transform: scale(.97); }

  /* ===== GAME ===== */
  #game { padding: 8px 8px 24px; gap: 6px; }

  .game-header {
    width: 100%; max-width: 400px;
    text-align: center; padding: 4px 0;
  }
  .game-header .player-name-display {
    font-size: 1.1rem; font-weight: 700;
    opacity: .9;
  }
  .game-header .bingo-small {
    font-size: 1.5rem; font-weight: 900;
    color: #FFD700;
    text-shadow: 2px 2px 0 #c4900a;
    letter-spacing: .1em;
  }

  /* Card tabs (when multiple cards) */
  .card-tabs {
    display: flex; gap: 6px;
    width: 100%; max-width: 400px;
    justify-content: center;
    padding: 4px 0;
  }
  .card-tab {
    padding: 8px 16px;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,.3);
    background: rgba(255,255,255,.1);
    color: #fff; font-size: .9rem; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: all .2s;
  }
  .card-tab.active {
    background: #FFD700; color: #333; border-color: #FFD700;
    box-shadow: 0 3px 10px rgba(255,215,0,.3);
  }
  .card-tab.bingo-achieved {
    animation: tabGlow 1s ease-in-out infinite alternate;
  }
  @keyframes tabGlow {
    from { box-shadow: 0 0 5px rgba(255,215,0,.5); }
    to { box-shadow: 0 0 20px rgba(255,215,0,1), 0 0 40px rgba(255,215,0,.5); }
  }

  /* Bingo grid */
  .bingo-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
    width: 100%;
    max-width: 400px;
    aspect-ratio: 1 / 1;
  }

  .bingo-cell {
    position: relative;
    background: var(--white);
    border-radius: var(--cell-radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform .15s;
    overflow: hidden;
    border: 2px solid rgba(0,0,0,.08);
    padding: 4px;
    -webkit-user-select: none;
    user-select: none;
  }
  .bingo-cell:active { transform: scale(.93); }

  .bingo-cell .fish-img { width: 80%; max-width: 70px; height: auto; line-height: 0; }
  .bingo-cell .fish-img svg { width: 100%; height: auto; display: block; }
  .bingo-cell .fish-name {
    font-size: .65rem; font-weight: 900;
    color: #333; margin-top: 2px;
    text-align: center; line-height: 1.1;
  }
  .bingo-cell .fish-name-sub {
    font-size: .55rem; font-weight: 700;
    color: #999;
  }

  .bingo-cell.stamped {
    background: rgba(255,215,0,.15);
    border-color: #FFD700;
  }
  .bingo-cell.stamped::after {
    content: '✓';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2.8rem;
    color: rgba(232,56,79,.7);
    font-weight: 900;
    pointer-events: none;
    text-shadow: 1px 1px 0 rgba(0,0,0,.1);
  }

  .bingo-cell.bingo-line {
    background: rgba(255,215,0,.35);
    border-color: #FFD700;
    animation: cellPulse .6s ease-in-out infinite alternate;
  }
  @keyframes cellPulse {
    from { box-shadow: inset 0 0 8px rgba(255,215,0,.3); }
    to { box-shadow: inset 0 0 15px rgba(255,215,0,.7); }
  }

  /* Bingo overlay */
  .bingo-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .bingo-overlay.show { display: flex; }
  .bingo-overlay-content {
    text-align: center;
    animation: popIn .4s cubic-bezier(.17,.67,.35,1.5);
  }
  @keyframes popIn {
    from { transform: scale(.3); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .bingo-overlay-content .big-text {
    font-size: 4rem; font-weight: 900;
    color: #FFD700;
    text-shadow: 4px 4px 0 #c4900a, 0 0 40px rgba(255,215,0,.6);
    letter-spacing: .1em;
  }
  .bingo-overlay-content .winner-name {
    font-size: 1.5rem; font-weight: 700;
    margin-top: 8px;
    text-shadow: 2px 2px 0 rgba(0,0,0,.3);
  }
  .bingo-overlay-content .confetti-text { font-size: 2rem; margin-top: 12px; }
  .bingo-overlay-content .dismiss-btn {
    margin-top: 20px;
    padding: 12px 32px;
    border-radius: 12px; border: none;
    background: #FFD700; color: #333;
    font-size: 1.1rem; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }

  /* Footer */
  .game-footer {
    display: flex; gap: 8px;
    width: 100%; max-width: 400px;
    margin-top: 6px;
  }
  .game-footer button {
    flex: 1; padding: 10px;
    border-radius: 10px; border: 2px solid rgba(255,255,255,.3);
    background: rgba(255,255,255,.12);
    color: #fff; font-size: .85rem; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: all .2s;
  }
  .game-footer button:active { background: rgba(255,255,255,.25); }

  /* Responsive */
  @media (min-width: 500px) {
    .bingo-cell .fish-img { max-width: 85px; }
    .bingo-cell .fish-name { font-size: .8rem; }
    .bingo-cell .fish-name-sub { font-size: .65rem; }
  }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup" class="screen active">
  <div class="logo-area">
    <h1>ザ・海上釣堀</h1>
    <div class="bingo-text">BINGO</div>
    <div class="subtitle">ビンゴを目指して魚を釣ろう！</div>
  </div>
  <div class="player-setup">
    <label>カード枚数</label>
    <div class="card-count-row" id="countRow"></div>
    <label>カードの名前</label>
    <div class="card-name-inputs" id="cardNameInputs"></div>
    <button class="start-btn" onclick="startGame()">🎣 ゲームスタート！</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="game-header">
    <div class="player-name-display" id="nameDisplay"></div>
    <div class="bingo-small">🎣 BINGO 🎣</div>
  </div>
  <div class="card-tabs" id="cardTabs"></div>
  <div class="bingo-grid" id="bingoGrid"></div>
  <div class="game-footer">
    <button onclick="resetAllCards()">🔄 全カードリセット</button>
    <button onclick="backToSetup()">🏠 最初に戻る</button>
  </div>
</div>

<!-- BINGO OVERLAY -->
<div class="bingo-overlay" id="bingoOverlay">
  <div class="bingo-overlay-content">
    <div class="confetti-text">🎉🐟🎊</div>
    <div class="big-text">BINGO!</div>
    <div class="winner-name" id="winnerName"></div>
    <div class="confetti-text">🎣🏆🎣</div>
    <button class="dismiss-btn" onclick="dismissBingo()">OK！</button>
  </div>
</div>

<script>
const FISH_SVG = {
  madai: `<svg viewBox="0 0 140 90" xmlns="http://www.w3.org/2000/svg"><ellipse cx="55" cy="45" rx="48" ry="28" fill="#e8384f"/><ellipse cx="55" cy="45" rx="44" ry="24" fill="#f25a6e"/><polygon points="103,45 135,25 135,65" fill="#e8384f"/><polygon points="103,45 131,30 131,60" fill="#d42d44"/><circle cx="27" cy="38" r="6" fill="#fff"/><circle cx="27" cy="38" r="3" fill="#222"/><ellipse cx="55" cy="45" rx="44" ry="24" fill="none" stroke="#c42035" stroke-width="0.7"/><path d="M35 35 Q55 30 75 35" stroke="#c42035" stroke-width="0.5" fill="none"/><path d="M35 42 Q55 38 75 42" stroke="#c42035" stroke-width="0.4" fill="none" opacity="0.5"/><path d="M35 50 Q55 46 75 50" stroke="#c42035" stroke-width="0.4" fill="none" opacity="0.4"/><polygon points="45,20 58,10 55,22" fill="#e8384f" stroke="#c42035" stroke-width="0.5"/><polygon points="58,68 72,78 69,66" fill="#e8384f" stroke="#c42035" stroke-width="0.5"/><path d="M12 45 Q6 42 12 39" stroke="#f25a6e" stroke-width="1" fill="none"/></svg>`,
  trout: `<svg viewBox="0 0 150 90" xmlns="http://www.w3.org/2000/svg"><ellipse cx="60" cy="45" rx="52" ry="22" fill="#78c9a0"/><ellipse cx="60" cy="45" rx="48" ry="18" fill="#8fd4af"/><polygon points="112,45 145,28 145,62" fill="#78c9a0"/><polygon points="112,45 141,32 141,58" fill="#5fb88a"/><circle cx="25" cy="40" r="5" fill="#fff"/><circle cx="25" cy="40" r="2.5" fill="#222"/><ellipse cx="60" cy="45" rx="48" ry="18" fill="none" stroke="#4a9e72" stroke-width="0.7"/><circle cx="40" cy="38" r="2" fill="#e8384f" opacity="0.7"/><circle cx="50" cy="42" r="1.8" fill="#e8384f" opacity="0.6"/><circle cx="60" cy="36" r="2.2" fill="#e8384f" opacity="0.7"/><circle cx="70" cy="44" r="1.5" fill="#e8384f" opacity="0.5"/><circle cx="47" cy="50" r="1.5" fill="#e8384f" opacity="0.5"/><circle cx="63" cy="50" r="1.8" fill="#e8384f" opacity="0.6"/><circle cx="77" cy="38" r="2" fill="#e8384f" opacity="0.6"/><circle cx="85" cy="45" r="1.5" fill="#e8384f" opacity="0.4"/><polygon points="50,25 63,16 61,27" fill="#78c9a0" stroke="#4a9e72" stroke-width="0.5"/><path d="M13 45 Q7 42 13 39" stroke="#8fd4af" stroke-width="1" fill="none"/></svg>`,
  kurosoi: `<svg viewBox="0 0 140 100" xmlns="http://www.w3.org/2000/svg"><ellipse cx="55" cy="50" rx="46" ry="30" fill="#3d4f5f"/><ellipse cx="55" cy="50" rx="42" ry="26" fill="#4a6070"/><polygon points="101,50 130,32 130,68" fill="#3d4f5f"/><polygon points="101,50 126,36 126,64" fill="#2e3e4d"/><circle cx="27" cy="42" r="7" fill="#ffd700"/><circle cx="27" cy="42" r="3.5" fill="#222"/><ellipse cx="55" cy="50" rx="42" ry="26" fill="none" stroke="#2a3a48" stroke-width="0.7"/><polygon points="35,24 55,10 60,20 40,30" fill="#3d4f5f" stroke="#2a3a48" stroke-width="0.5"/><path d="M40 24 L45 20 L55 16 L60 20" stroke="#2a3a48" stroke-width="0.8" fill="none"/><polygon points="55,74 70,86 65,74" fill="#3d4f5f" stroke="#2a3a48" stroke-width="0.5"/><path d="M13 50 Q7 46 13 42" stroke="#4a6070" stroke-width="1.5" fill="none"/></svg>`,
  ginzake: `<svg viewBox="0 0 150 90" xmlns="http://www.w3.org/2000/svg"><ellipse cx="60" cy="45" rx="52" ry="20" fill="#a8b5bf"/><ellipse cx="60" cy="45" rx="48" ry="16" fill="#bcc8d1"/><polygon points="112,45 145,28 145,62" fill="#a8b5bf"/><polygon points="112,45 141,32 141,58" fill="#8e9da8"/><circle cx="25" cy="40" r="5" fill="#fff"/><circle cx="25" cy="40" r="2.5" fill="#222"/><ellipse cx="60" cy="45" rx="48" ry="16" fill="none" stroke="#8090a0" stroke-width="0.7"/><path d="M30 40 Q60 36 90 40" stroke="#8090a0" stroke-width="0.5" fill="none"/><path d="M30 45 Q60 42 90 45" stroke="#8090a0" stroke-width="0.4" fill="none" opacity="0.4"/><path d="M30 50 Q60 47 90 50" stroke="#8090a0" stroke-width="0.4" fill="none" opacity="0.3"/><polygon points="50,27 63,18 61,29" fill="#a8b5bf" stroke="#8090a0" stroke-width="0.5"/><circle cx="45" cy="38" r="1.2" fill="#708090" opacity="0.5"/><circle cx="60" cy="36" r="1" fill="#708090" opacity="0.4"/><circle cx="75" cy="39" r="1.3" fill="#708090" opacity="0.5"/><path d="M13 45 Q7 42 13 39" stroke="#bcc8d1" stroke-width="1" fill="none"/></svg>`,
  hirame: `<svg viewBox="0 0 180 80" xmlns="http://www.w3.org/2000/svg"><ellipse cx="75" cy="40" rx="72" ry="22" fill="#c68e17"/><ellipse cx="75" cy="40" rx="68" ry="18" fill="#d4a030"/><polygon points="147,40 175,28 175,52" fill="#c68e17"/><polygon points="147,40 171,31 171,49" fill="#a87614"/><circle cx="40" cy="32" r="6" fill="#fff"/><circle cx="40" cy="32" r="3" fill="#222"/><circle cx="55" cy="30" r="5" fill="#fff"/><circle cx="55" cy="30" r="2.5" fill="#222"/><ellipse cx="75" cy="40" rx="68" ry="18" fill="none" stroke="#a07010" stroke-width="0.7"/><circle cx="50" cy="38" r="2.5" fill="#a07010" opacity="0.5"/><circle cx="65" cy="35" r="3" fill="#a07010" opacity="0.4"/><circle cx="85" cy="38" r="2" fill="#a07010" opacity="0.5"/><circle cx="100" cy="35" r="2.5" fill="#a07010" opacity="0.4"/><circle cx="75" cy="44" r="2" fill="#a07010" opacity="0.3"/><circle cx="115" cy="40" r="1.8" fill="#a07010" opacity="0.4"/><polygon points="60,20 73,10 71,22" fill="#c68e17" stroke="#a07010" stroke-width="0.5"/><polygon points="65,58 78,68 75,56" fill="#c68e17" stroke="#a07010" stroke-width="0.5"/><path d="M10 40 Q4 37 10 34" stroke="#d4a030" stroke-width="1" fill="none"/></svg>`
};

const FISH = [
  { id: 'madai',   name: 'マダイ',   sub: '真鯛',    weight: 8 },
  { id: 'trout',   name: 'トラウト',  sub: 'サーモン', weight: 3 },
  { id: 'kurosoi', name: 'クロソイ',  sub: '黒曹以',   weight: 2 },
  { id: 'ginzake', name: 'ギンザケ',  sub: '銀鮭',    weight: 2 },
  { id: 'hirame',  name: 'ヒラメ',   sub: '鮃',      weight: 2 },
];

function pickFish() {
  const total = FISH.reduce((s, f) => s + f.weight, 0);
  let r = Math.random() * total;
  for (const f of FISH) { r -= f.weight; if (r <= 0) return { ...f }; }
  return { ...FISH[0] };
}

function generateCard() {
  const cells = [];
  const guaranteed = FISH.map(f => ({ ...f }));
  for (let i = guaranteed.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [guaranteed[i], guaranteed[j]] = [guaranteed[j], guaranteed[i]];
  }
  for (let i = 0; i < 5; i++) cells.push({ ...guaranteed[i], stamped: false });
  for (let i = 5; i < 16; i++) cells.push({ ...pickFish(), stamped: false });
  for (let i = cells.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cells[i], cells[j]] = [cells[j], cells[i]];
  }
  return cells;
}

let cardCount = 1;
let cardNames = [];
let cards = [];
let currentCard = 0;
let bingoShownFor = new Set();

// Setup
function initSetup() {
  const row = document.getElementById('countRow');
  row.innerHTML = '';
  for (let i = 1; i <= 4; i++) {
    const btn = document.createElement('button');
    btn.textContent = i;
    btn.onclick = () => selectCount(i);
    if (i === cardCount) btn.classList.add('selected');
    row.appendChild(btn);
  }
  updateCardNameInputs();
}

function selectCount(n) {
  cardCount = n;
  document.querySelectorAll('.card-count-row button').forEach((btn, idx) => {
    btn.classList.toggle('selected', idx + 1 === n);
  });
  updateCardNameInputs();
}

function updateCardNameInputs() {
  const container = document.getElementById('cardNameInputs');
  const existing = container.querySelectorAll('input');
  const existingValues = Array.from(existing).map(el => el.value);
  container.innerHTML = '';
  for (let i = 0; i < cardCount; i++) {
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = cardCount === 1 ? 'あなたの名前' : `カード ${i + 1} の名前`;
    input.value = existingValues[i] || '';
    input.maxLength = 10;
    container.appendChild(input);
  }
}

// Start
function startGame() {
  const inputs = document.querySelectorAll('.card-name-inputs input');
  cardNames = [];
  cards = [];
  inputs.forEach((inp, i) => {
    cardNames.push(inp.value.trim() || `カード ${i + 1}`);
    cards.push(generateCard());
  });
  currentCard = 0;
  bingoShownFor = new Set();

  document.getElementById('setup').classList.remove('active');
  document.getElementById('game').classList.add('active');
  document.getElementById('nameDisplay').textContent = cardNames[0];
  renderTabs();
  renderGrid();
}

// Render
function renderTabs() {
  const container = document.getElementById('cardTabs');
  container.innerHTML = '';
  document.getElementById('nameDisplay').textContent = cardNames[currentCard];
  if (cardCount === 1) { container.style.display = 'none'; return; }
  container.style.display = 'flex';
  for (let i = 0; i < cardCount; i++) {
    const tab = document.createElement('button');
    tab.className = 'card-tab' + (i === currentCard ? ' active' : '');
    tab.textContent = cardNames[i];
    if (checkBingo(cards[i]).length > 0) tab.classList.add('bingo-achieved');
    tab.onclick = () => { currentCard = i; renderTabs(); renderGrid(); };
    container.appendChild(tab);
  }
}

function renderGrid() {
  const grid = document.getElementById('bingoGrid');
  grid.innerHTML = '';
  const card = cards[currentCard];
  const bingoLines = checkBingo(card);
  const bingoCells = new Set();
  bingoLines.forEach(line => line.forEach(idx => bingoCells.add(idx)));

  const colorMap = {
    madai: 'var(--madai)', trout: 'var(--trout)',
    kurosoi: 'var(--kurosoi)', ginzake: 'var(--ginzake)', hirame: 'var(--hirame)'
  };

  card.forEach((cell, i) => {
    const div = document.createElement('div');
    div.className = 'bingo-cell';
    if (cell.stamped) div.classList.add('stamped');
    if (bingoCells.has(i)) div.classList.add('bingo-line');
    div.style.borderBottomColor = colorMap[cell.id] || '#ddd';
    div.style.borderBottomWidth = '3px';
    div.innerHTML = `
      <div class="fish-img">${FISH_SVG[cell.id]}</div>
      <div class="fish-name" style="color: ${colorMap[cell.id] || '#333'}">${cell.name}</div>
      <div class="fish-name-sub">${cell.sub}</div>
    `;
    div.onclick = () => toggleCell(i);
    grid.appendChild(div);
  });
}

function toggleCell(index) {
  const card = cards[currentCard];
  if (card[index].stamped) return; // 一度開けたら戻せない
  if (!confirm(`「${card[index].name}」を開けますか？`)) return;
  card[index].stamped = true;
  renderGrid();
  renderTabs();
  const lines = checkBingo(card);
  if (lines.length > 0 && !bingoShownFor.has(currentCard)) {
    bingoShownFor.add(currentCard);
    setTimeout(() => showBingo(currentCard), 300);
  }
}

// Bingo check
function checkBingo(card) {
  const lines = [];
  for (let r = 0; r < 4; r++) {
    const row = [r*4, r*4+1, r*4+2, r*4+3];
    if (row.every(i => card[i].stamped)) lines.push(row);
  }
  for (let c = 0; c < 4; c++) {
    const col = [c, c+4, c+8, c+12];
    if (col.every(i => card[i].stamped)) lines.push(col);
  }
  const d1 = [0,5,10,15], d2 = [3,6,9,12];
  if (d1.every(i => card[i].stamped)) lines.push(d1);
  if (d2.every(i => card[i].stamped)) lines.push(d2);
  return lines;
}

// Overlay
function showBingo(cardIdx) {
  document.getElementById('winnerName').textContent = `${cardNames[cardIdx]} BINGO！🎉`;
  document.getElementById('bingoOverlay').classList.add('show');
  if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
}

function dismissBingo() {
  document.getElementById('bingoOverlay').classList.remove('show');
}

// Actions
function resetAllCards() {
  if (confirm('全カードをリセットしますか？')) {
    cards = [];
    for (let i = 0; i < cardCount; i++) cards.push(generateCard());
    currentCard = 0;
    bingoShownFor = new Set();
    renderTabs();
    renderGrid();
  }
}

function backToSetup() {
  if (confirm('最初の画面に戻りますか？')) {
    document.getElementById('game').classList.remove('active');
    document.getElementById('setup').classList.add('active');
  }
}

initSetup();
</script>
